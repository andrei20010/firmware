; PlatformIO Project Configuration File
;
; Freenove FNK0104 board profile for Bruce firmware.

[env:freenove_fnk0104]
board = freenove_fnk0104
monitor_speed = 115200
board_build.partitions = custom_16Mb.csv
build_src_filter = ${env.build_src_filter} +<../boards/freenove_fnk0104> -<src/core/menu_items/RFIDMenu.cpp>
build_flags =
	${env.build_flags}
	-Iboards/freenove_fnk0104
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DHAS_SCREEN=1
	-DHAS_TOUCH=1
	-DROTATION=1
	-DTFT_HEIGHT=320
	-DTFT_WIDTH=240
	-DTFT_MISO=13
	-DTFT_MOSI=11
	-DTFT_SCLK=12
	-DTFT_CS=10
	-DTFT_DC=46
	-DTFT_RST=-1
	-DTFT_BL=45
	-DTFT_BACKLIGHT_ON=HIGH
	-DILI9341_2_DRIVER=1
	-DUSER_SETUP_LOADED=1
	-DSMOOTH_FONT=1
	-DLOAD_GFXFF=1
	-DUSE_SD_MMC=1
	-DPIN_SD_CLK=38
	-DPIN_SD_CMD=40
	-DPIN_SD_D0=39
	-DPIN_SD_D1=41
	-DPIN_SD_D2=48
	-DPIN_SD_D3=47
	-DI2S_MCLK_PIN=4
	-DBCLK=5
	-DWCLK=7
	-DI2S_DIN_PIN=6
	-DI2S_DOUT_PIN=8
	-DAMP_ENABLE=1
	-DDEVICE_NAME='"Freenove FNK0104"'
	-DUSE_HSPI_PORT=1
    -DSPI_FREQUENCY=40000000
	-DTOUCH_SDA=16
    -DTOUCH_SCL=15
    -DTOUCH_INT=17
    -DTOUCH_RST=18

lib_deps =
	${env.lib_deps}
